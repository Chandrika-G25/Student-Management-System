<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Login</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .login-btn:hover {
            background: #0056b3;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">

        <h2>SMS <span>ERP</span></h2>
        <p>Advanced Student Management System</p>

        <form id="loginForm">

            <div class="input-field">
                <label>Institutional Email</label>
                <input type="email" id="email" placeholder="admin@college.com" required>
            </div>

            <div class="input-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px; padding: 14px;">
                Secure Login
            </button>

            <div id="errorMsg" class="error"></div>

        </form>

        <div class="footer">
            Protected by Standard Encryption
        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
